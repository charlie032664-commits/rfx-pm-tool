version: 2

# 先用「類別→Owner」做基本接球（避免TBD）
# Owner 列表：EE/Platform | EE/Storage | SW/Storage | SE/Storage | SE/System |
#             AE/Storage | BMC | BIOS | ME | Thermal | Power | QA | Legal | PM | TBD
category_to_owner:
  BIOS: "BIOS"
  BMC: "BMC"
  Security: "QA"
  Compliance: "QA"
  Reliability: "QA"
  Documentation: "PM"

  Power: "Power"
  Thermal: "Thermal"
  Mechanical: "ME"

  Storage/HW: "EE/Storage"
  Storage/SW: "SW/Storage"
  Platform: "EE/Platform"

  Commercial: "PM"
  Legal: "Legal"

  Glossary: "TBD"
  General: "EE/Platform"   # 重要：General不要掉到TBD

# 若 category 判不出來或過於General，再用關鍵字強制指定 owner
# 這是最有效降低TBD的方法（你後面可逐步擴充）
keyword_to_owner:
  BIOS:
    - "PXE"
    - "BBS"
